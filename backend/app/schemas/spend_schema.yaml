# 소비 패턴 분석용 입력 스키마 — capstone schema_v2_open_mock.yaml 확장
version: "1"
name: consume_pattern_v1

# 거래 식별
id:
  canonical: transaction_id
  aliases: [transaction_id, tx_id, ID]

# 사용자 식별
user_id:
  canonical: user_id
  aliases: [user_id, uid, customer_id]

# 시간
timestamp:
  canonical: timestamp
  aliases: [timestamp, event_ts, Time, TransactionDT]

# 금액
amount:
  canonical: amount
  aliases: [amount, Amount, amt]
  type: float

# 카테고리 (MCC 기반 매핑)
category:
  canonical: category
  allowed: [food, shopping, transport, entertainment, education, healthcare, housing, utilities, finance, travel, other]
  default: other

# 채널
channel:
  canonical: channel
  allowed: [app, web, offline]
  default: app

# 가맹점
merchant_id:
  canonical: merchant_id
  aliases: [merchant_id, store_id, shop_id]

# 국내/해외
is_domestic:
  canonical: is_domestic
  type: boolean
  default: true

# 메모
memo:
  canonical: memo
  aliases: [memo, description, note]
  required: false

# fraud-service 연계 시 선택적 포함
fraud_features_optional:
  - V1
  - V2
  - V3
  - V4
  - V5
  - V6
  - V7
  - V8
  - V9
  - V10
  - V11
  - V12
  - V13
  - V14
  - V15
  - V16
  - V17
  - V18
  - V19
  - V20
  - V21
  - V22
  - V23
  - V24
  - V25
  - V26
  - V27
  - V28
  - V29
  - V30
