# 운영 목표·알람 기준 (프로토타입 — 수치는 환경에 맞게 조정)
version: "1"
name: ops_targets_v1

# C3 보강: 로컬 단일 프로세스 배치 벤치(참고) — p99 SLO와 동일하지 않음
#   ops_benchmark.py, open test 상위 8k행, RF+imputer 기준 대략 6만~7만 rps 관측 예시
observed_reference:
  benchmark_script: scripts/fds/ops_benchmark.py
  note: "벽시계 단일 런; 멀티워커·네트워크·직렬화 미포함"

latency:
  target_ms_p99_per_transaction: 50
  minimum_throughput_rps: 50

monitoring:
  score_distribution_shift_psi_alert: 0.2
  mean_shift_sigma_alert: 3.0

drift:
  # 라벨 있는 구간에서 주기적으로 재측정
  auc_drop_alert: 0.05
  pr_auc_drop_alert: 0.05

audit:
  explain_fields:
    - transaction_id
    - model_score
    - model_action
    - rule_ids
    - final_action
    - reason_code
  production_note: "운영 로그에는 PII 최소화 — transaction_id 해시·금액 구간화 권장"
