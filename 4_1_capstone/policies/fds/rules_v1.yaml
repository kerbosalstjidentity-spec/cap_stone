# 규칙 선행 — 모델 점수와 합성 시 더 강한 조치(BLOCK > REVIEW > PASS)를 택함.
version: "1"
name: rules_v1

rules:
  - id: R_BLOCKLIST_TXN
    action: BLOCK
    blocklist_file:
      column: transaction_id
      path: data/fds/blocklist_transaction_ids.example.txt

  - id: R_AMOUNT_REVIEW
    action: REVIEW
    amount_above: 5000
    skip_if_no_amount: true

  - id: R_AMOUNT_BLOCK
    action: BLOCK
    amount_above: 500000
    skip_if_no_amount: true
