# FDS 입력 스키마 v2 (모의) — open v1 특성 + 규칙용 메타 컬럼
# 모델 입력은 여전히 V1–V30. channel·country_txn 은 규칙 엔진·감사용(선택).
version: "2"
name: open_v2_mock

id:
  canonical: transaction_id
  aliases: [transaction_id, ID]

event_ts:
  canonical: event_ts
  aliases: [event_ts, Time, TransactionDT]
  required: false

amount:
  canonical: amount
  aliases: [amount, Amount]
  required: false

features:
  - V1
  - V2
  - V3
  - V4
  - V5
  - V6
  - V7
  - V8
  - V9
  - V10
  - V11
  - V12
  - V13
  - V14
  - V15
  - V16
  - V17
  - V18
  - V19
  - V20
  - V21
  - V22
  - V23
  - V24
  - V25
  - V26
  - V27
  - V28
  - V29
  - V30

label:
  canonical: is_fraud
  aliases: [Class, is_fraud, isFraud]
  required_for_training: true

missing:
  imputer_strategy: median

# 문서용(로더 검증 아님): CSV에 있으면 rules_engine 이 컬럼명으로 평가 가능
metadata_for_rules_optional:
  - channel
  - country_txn
