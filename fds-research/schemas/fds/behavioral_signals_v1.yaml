# Layer 1 — Client/Edge Risk Signal Schema v1
#
# 교수님 연구 연계:
#   - "EC-SVC: Edge Computing 기반 차량 내 통신" (TIFS 2022)
#     → 차량 OBD 신호를 웹 디바이스 핑거프린트 + 행동 생체인식으로 치환
#   - "차량 보안 위협 방지 공격 대응 및 지능형 RSU 기술" (IITP)
#     → RSU 에지 처리를 브라우저 사이드 경량 수집으로 치환

behavioral_signals:
  device_fingerprint:
    user_agent_hash:
      type: string
      description: "User-Agent 문자열의 SHA-256 해시 (식별자 아님, 패턴용)"
    screen_resolution:
      type: string
      description: "화면 해상도 (e.g. '1920x1080')"
    timezone_offset:
      type: integer
      description: "UTC 오프셋 (분 단위, e.g. -540 for KST)"
    language:
      type: string
      description: "브라우저 언어 (e.g. 'ko-KR')"
    platform:
      type: string
      description: "OS 플랫폼 (e.g. 'Win32', 'MacIntel')"

  behavioral_biometrics:
    mouse_avg_speed:
      type: float
      description: "마우스 평균 이동 속도 (px/ms)"
      risk_signal: "봇은 일정 속도, 사람은 불규칙"
    mouse_speed_variance:
      type: float
      description: "마우스 속도 분산"
      risk_signal: "분산 0에 가까우면 자동화 의심"
    key_dwell_avg:
      type: float
      description: "키 누름 지속 시간 평균 (ms)"
    key_flight_avg:
      type: float
      description: "키 간 비행 시간 평균 (ms)"
    scroll_velocity:
      type: float
      description: "스크롤 속도 (px/s)"
    clipboard_paste_count:
      type: integer
      description: "Ctrl+V 횟수 (카드번호 자동 입력 감지)"
    form_fill_duration_ms:
      type: integer
      description: "결제 폼 작성 소요 시간 (ms)"
      risk_signal: "< 3초면 자동 입력 의심"

  session_context:
    tab_focus_changes:
      type: integer
      description: "탭 전환 횟수"
    page_dwell_time_ms:
      type: integer
      description: "결제 페이지 체류 시간 (ms)"
    back_navigation_count:
      type: integer
      description: "뒤로가기 횟수"

  network_context:
    ip_country:
      type: string
      description: "IP 국가 코드 (ISO 3166-1 alpha-2)"
    is_vpn:
      type: boolean
      description: "VPN 감지 여부"
    is_proxy:
      type: boolean
      description: "프록시 감지 여부"
    is_tor:
      type: boolean
      description: "Tor 감지 여부"
    connection_type:
      type: string
      description: "연결 유형 (wifi / cellular / wired)"

# 리스크 시그널 가중치 (ML 피처 엔지니어링 참조)
risk_weights:
  clipboard_paste_count: 0.3
  form_fill_duration_ms_lt_3000: 0.4
  mouse_speed_variance_lt_0_01: 0.3
  is_vpn: 0.2
  is_tor: 0.5
  tab_focus_changes_gt_10: 0.1
