# v2 모의 데이터용 — 국가·블록리스트 (rules_v1 패턴 동일)
version: "2"
name: rules_v2_mock

rules:
  - id: R_BLOCKLIST_TXN
    action: BLOCK
    blocklist_file:
      column: transaction_id
      path: data/fds/blocklist_transaction_ids.example.txt

  - id: R_COUNTRY_REVIEW
    action: REVIEW
    column_in_values:
      column: country_txn
      values: ["HIGH_RISK"]
    skip_if_missing_column: true

  - id: R_AMOUNT_REVIEW
    action: REVIEW
    amount_above: 5000
    skip_if_no_amount: true

  - id: R_AMOUNT_BLOCK
    action: BLOCK
    amount_above: 500000
    skip_if_no_amount: true
